# AniMind Docker Compose — Qdrant + vLLM Reranker
# Usage: docker compose up -d
# Verify: docker compose ps && curl localhost:6333/healthz && curl localhost:8001/health

services:
  # ── Qdrant Vector Database ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: animind-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 200M
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── vLLM Reranker (Qwen3-Reranker-0.6B) ────────────────────────
  reranker:
    image: vllm/vllm-openai:v0.19.1
    container_name: animind-reranker
    ports:
      - "8001:8001"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command:
      - "Qwen/Qwen3-Reranker-0.6B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--runner"
      - "pooling"
      - "--gpu-memory-utilization"
      - "0.15"
      - "--max-model-len"
      - "512"
      - "--dtype"
      - "auto"
      - "--hf_overrides"
      - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ── Named Volumes ───────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local

# ── Network ─────────────────────────────────────────────────────
networks:
  animind:
    driver: bridge
    name: animind
