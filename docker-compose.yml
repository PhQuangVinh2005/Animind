# AniMind Docker Compose — Full Stack
#
# Services:
#   Infrastructure (always start):  qdrant, reranker, nginx, dozzle
#   Backend  (--profile backend):   FastAPI backend
#   Frontend (--profile frontend):  Next.js frontend
#
# Usage:
#   docker compose --profile backend --profile frontend up -d   # start all
#   docker compose --profile backend up -d                      # backend + infra
#   docker compose stop backend                                 # stop backend only
#   docker compose --profile backend --profile frontend down    # stop everything
#
# Logs:  http://localhost:9999 (Dozzle)

services:
  # ── Qdrant Vector Database ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: animind-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      # Qdrant image has no curl/wget — use bash TCP check
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 200M
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── vLLM Reranker (Qwen3-Reranker-0.6B) ────────────────────────
  reranker:
    image: vllm/vllm-openai:v0.19.1
    container_name: animind-reranker
    ports:
      - "8001:8001"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command:
      - "Qwen/Qwen3-Reranker-0.6B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "--runner"
      - "pooling"
      - "--gpu-memory-utilization"
      - "0.15"
      - "--max-model-len"
      - "512"
      - "--dtype"
      - "auto"
      - "--hf_overrides"
      - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── NGINX Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: animind-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
        required: false
      frontend:
        condition: service_healthy
        required: false
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dozzle (Log Viewer) ─────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: animind-dozzle
    ports:
      - "127.0.0.1:9999:8080"   # localhost-only access
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - animind
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: animind-backend
    profiles:
      - backend
    env_file:
      - ./backend/.env
    environment:
      # Override paths for Docker networking
      - QDRANT_URL=http://qdrant:6333
      - RERANKER_URL=http://reranker:8001
      - AGENT_DB_PATH=/app/data/agent_state.db
      - FRONTEND_URL=https://chat.vinhkaguya.me
    volumes:
      - agent_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      reranker:
        condition: service_healthy
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Next.js Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.vinhkaguya.me
    container_name: animind-frontend
    profiles:
      - frontend
    environment:
      # Server-side: SSE proxy reaches backend via Docker DNS
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
        required: false
    networks:
      - animind
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Named Volumes ───────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local
  agent_data:
    driver: local

# ── Network ─────────────────────────────────────────────────────
networks:
  animind:
    driver: bridge
    name: animind
