# AniMind NGINX Reverse Proxy
# Routes two subdomains to their respective Docker containers:
#   chat.vinhkaguya.me  → frontend:3000 (Next.js)
#   api.vinhkaguya.me   → backend:8000  (FastAPI)
#
# TLS is handled by Cloudflare — NGINX only sees plain HTTP from the tunnel.
#
# NOTE: Uses Docker's embedded DNS resolver (127.0.0.11) so NGINX can start
# even if backend/frontend containers aren't running yet. The upstream is
# resolved at request time, not at startup.

resolver 127.0.0.11 valid=10s ipv6=off;

# ── Frontend: chat.vinhkaguya.me ──────────────────────────────────────────────
server {
    listen 80;
    server_name chat.vinhkaguya.me;

    # SSE streaming support (Next.js proxy route /api/chat/stream)
    proxy_buffering off;
    proxy_cache off;

    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, not used in prod but harmless)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── Backend API: api.vinhkaguya.me ────────────────────────────────────────────
server {
    listen 80;
    server_name api.vinhkaguya.me;

    # SSE streaming — critical: disable all buffering
    proxy_buffering off;
    proxy_cache off;

    # Increase timeouts for long SSE streams
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: prevent NGINX from buffering the event stream
        proxy_set_header X-Accel-Buffering no;
        proxy_set_header Connection        "";

        # Allow large request bodies (for potential file uploads)
        client_max_body_size 10M;
    }
}

# ── Default: reject unknown hosts ─────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
